<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="layout.css" />
    <link rel="stylesheet" href="video.css" />
    <link rel="stylesheet" href="captions.css" />
    <link rel="stylesheet" href="settings-menu.css" />
    <link rel="stylesheet" href="settings-picker.css" />
    <title>Test</title>
  </head>
  <body>
    <main class="page-wrapper">
      <section class="text-section">
        <div class="text-column">
          <article class="blurb">
            <h2>Subtitles</h2>
            <h3>Agus Wijaya</h3>
            <pre style="font-family: Helvetica, sans-serif">
A video plays on loop.
A system of subtitles
describes, anticipates
and misreads what is
happening. They produce
meaning rather than
clarify. It becomes
unclear what is being
described, or who
is speaking.
            </pre>
          </article>
          <nav
            class="settings-menu-inline"
            id="settings-inline"
            aria-label="Settings"
          ></nav>
        </div>
      </section>
      <div class="play-section">
        <h2 class="play-button">Play</h2>
      </div>
    </main>
    <div class="video-container">
      <button class="close-button" aria-label="Close video">&times;</button>
      <div class="video-wrapper">
        <video autoplay muted loop playsinline webkit-playsinline="true">
          <source
            src="https://vimeo.com/1209314643/8e3ff1a4bd?share=copy&fl=sv&fe=ci"
            type="video/mp4"
          />
        </video>
      </div>
    </div>
    <button
      class="burger-button"
      id="burger-button"
      aria-label="Open settings"
      aria-expanded="false"
    >
      &#9776;
    </button>
    <nav
      class="settings-menu-floating"
      id="settings-floating"
      aria-label="Settings"
      hidden
    ></nav>
    <div class="settings-picker" id="settings-picker" hidden>
      <button class="picker-close" id="picker-close" aria-label="Close">
        &larr; Back
      </button>
      <div class="picker-track" id="picker-track" role="listbox">
        <div class="picker-track-inner" id="picker-track-inner"></div>
      </div>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
